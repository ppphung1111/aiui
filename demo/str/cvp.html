
<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>

<video controls autoplay muted playsinline poster="" id="v1">
  <source src="director.mp4" type="video/mp4">
</video>

<script>
var eVi = document.getElementById("v1");//createElement('video');
eVi.style.position="fixed"
//eVi.style.bottom="0px"
eVi.style.width="300px"
eVi.style.height="300px"
document.body.appendChild(eVi)

var dcv = document.createElement('canvas');
dcv.style.position="fixed"
dcv.style.right="0px"
dcv.style.width="50%"
dcv.style.height="50%"
var ctx = dcv.getContext('2d');
document.body.appendChild(dcv)
eVi.style.visibility="hidden";
//eVi.controls=false;
/*
eVi.muted=true;
eVi.inlinesplay=true;
eVi.inlinesPlay=true;
eVi.autoplay=true;
eVi.src="director.mp4";
*/
eVi.addEventListener('play', function () {
    const This=this;
    (function loop() {
        if (!This.paused && !This.ended) {
            ctx.drawImage(This, 0, 0);
            setTimeout(loop, 1000 / 30); // drawing at 30fps
        }
    })();
}, 0);

</script>
</body>
</html>
